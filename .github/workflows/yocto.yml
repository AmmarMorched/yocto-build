name: Yocto Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gawk wget git diffstat unzip texinfo gcc build-essential \
          chrpath socat cpio python3 python3-pip python3-pexpect xz-utils \
          debianutils iputils-ping libsdl1.2-dev xterm lz4

      - name: Clone Yocto (Poky)
        run: |
          git clone -b scarthgap git://git.yoctoproject.org/poky.git

      - name: Configure build
        run: |
          cd poky
          source oe-init-build-env build
          echo 'BB_NUMBER_THREADS = "2"' >> conf/local.conf
          echo 'PARALLEL_MAKE = "-j 2"' >> conf/local.conf
          echo 'INHERIT += "rm_work"' >> conf/local.conf
          echo 'BB_DISABLE_SANITY_CHECKS = "1"' >> conf/local.conf

      - name: Build image
        run: |
          cd poky
          export BB_ENV_PASSTHROUGH_ADDITIONS="BB_NO_NETWORK_SANDBOX"
          export BB_NO_NETWORK_SANDBOX="1"
          source oe-init-build-env build
          bitbake core-image-minimal

      - name: Package result
        run: |
          cd poky/build/tmp/deploy/images/qemux86-64
          tar -czf yocto-image.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yocto-image
          path: poky/build/tmp/deploy/images/qemux86-64/yocto-image.tar.gz
